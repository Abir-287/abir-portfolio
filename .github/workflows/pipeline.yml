name: Portfolio CI/CD Pipeline
on:
  push:
    branches: [main]
jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npx next lint --strict
      - run: npm test --watchAll=false --passWithNoTests || echo "Tests completed"
  deploy:
    runs-on: ubuntu-latest
    needs: quality-checks
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"
      - run: terraform init
        working-directory: terraform
      - run: terraform apply -auto-approve
        working-directory: terraform
        env:
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      - id: get-ip
        run: echo "SERVER_IP=$(terraform output -raw public_ip_address)" >> $GITHUB_ENV
        working-directory: terraform
      - id: get-kv
        run: echo "KEY_VAULT_NAME=$(terraform output -raw key_vault_name)" >> $GITHUB_ENV
        working-directory: terraform
      - run: docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
      - run: |
          docker build -t portfolio:latest .
          docker tag portfolio:latest ${{ secrets.ACR_LOGIN_SERVER }}/portfolio:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/portfolio:latest
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Write SSH Key to File
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ssh_key.pem
          chmod 600 ssh_key.pem
      - name: Deploy to VM0
        run: |
          az network bastion ssh --name portfolio-bastion --resource-group portfolio-resource-group --target-resource-id /subscriptions/945fbf19-fca5-4cb8-9924-2512c0381d15/resourceGroups/portfolio-resource-group/providers/Microsoft.Compute/virtualMachines/portfolio-vm-0 --auth-type ssh-key --username azureuser --ssh-key ssh_key.pem --command "cd /var/www/portfolio && echo 'ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}' > .env && echo 'ACR_USERNAME=${{ secrets.ACR_USERNAME }}' >> .env && echo 'ACR_PASSWORD=${{ secrets.ACR_PASSWORD }}' >> .env && echo 'KEY_VAULT_NAME=${{ env.KEY_VAULT_NAME }}' >> .env && chmod +x deploy.sh && ./deploy.sh && curl -f http://localhost:3000 || exit 1" || exit 1
      - name: Deploy to VM1
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ env.SERVER_IP }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            az network bastion ssh --name portfolio-bastion --resource-group portfolio-resource-group --target-resource-id /subscriptions/945fbf19-fca5-4cb8-9924-2512c0381d15/resourceGroups/portfolio-resource-group/providers/Microsoft.Compute/virtualMachines/portfolio-vm-1 --auth-type ssh-key --username azureuser --ssh-key ssh_key.pem --command "cd /var/www/portfolio && echo 'ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}' > .env && echo 'ACR_USERNAME=${{ secrets.ACR_USERNAME }}' >> .env && echo 'ACR_PASSWORD=${{ secrets.ACR_PASSWORD }}' >> .env && echo 'KEY_VAULT_NAME=${{ env.KEY_VAULT_NAME }}' >> .env && chmod +x deploy.sh && ./deploy.sh && curl -f http://localhost:3000 || exit 1" || exit 1
      - run: |
          for i in {1..5}; do
            sleep 30
            curl -f http://${{ env.SERVER_IP }} && exit 0
            echo "Retrying health check ($i/5)..."
          done
          echo "❌ Health check failed"
          exit 1
      - if: failure()
        name: Rollback on VM0
        run: |
          az network bastion ssh --name portfolio-bastion --resource-group portfolio-resource-group --target-resource-id /subscriptions/945fbf19-fca5-4cb8-9924-2512c0381d15/resourceGroups/portfolio-resource-group/providers/Microsoft.Compute/virtualMachines/portfolio-vm-0 --auth-type ssh-key --username azureuser --ssh-key ssh_key.pem || true
